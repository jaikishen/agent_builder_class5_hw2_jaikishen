<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9a9a"/>
    </marker>
    <marker id="arr-brand" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3ECF8E"/>
    </marker>
    <radialGradient id="glow" cx="0.18" cy="0.05" r="0.5">
      <stop offset="0%" stop-color="#3ECF8E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3ECF8E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.95" r="0.45">
      <stop offset="0%" stop-color="#3ECF8E" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3ECF8E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="820" fill="#1A1A1A"/>
  <rect width="1400" height="820" fill="url(#glow)"/>
  <rect width="1400" height="820" fill="url(#glow2)"/>

  <!-- Blueprint column hairlines (very faint) -->
  <g stroke="#262626" stroke-width="0.5" stroke-dasharray="2 6">
    <line x1="285" y1="150" x2="285" y2="555"/>
    <line x1="535" y1="150" x2="535" y2="555"/>
    <line x1="785" y1="150" x2="785" y2="555"/>
    <line x1="1015" y1="150" x2="1015" y2="555"/>
  </g>

  <!-- Title -->
  <g transform="translate(40, 60)">
    <text font-size="30" font-weight="600" fill="#EDEDED" letter-spacing="-0.025em">
      SkyNova<tspan fill="#7a7a7a" font-weight="400"> &#8201;//&#8201; anatomy of an </tspan><tspan font-family="Georgia, 'Times New Roman', serif" font-style="italic" fill="#3ECF8E" font-weight="500">answer</tspan>
    </text>
  </g>
  <text x="40" y="92" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10.5" fill="#8a8a8a" letter-spacing="0.22em">
    ONE  QUESTION  ·  FIVE  TIERS  ·  LEFT  →  RIGHT
  </text>
  <line x1="40" y1="106" x2="160" y2="106" stroke="#3ECF8E" stroke-width="1.5"/>

  <!-- Tier column headers — numbered, monospace, brand green -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" letter-spacing="0.2em">
    <text x="40"   y="140" fill="#3ECF8E">01</text> <text x="60"   y="140" fill="#8a8a8a">CLIENT</text>
    <text x="295"  y="140" fill="#3ECF8E">02</text> <text x="315"  y="140" fill="#8a8a8a">API</text>
    <text x="545"  y="140" fill="#3ECF8E">03</text> <text x="565"  y="140" fill="#8a8a8a">RUNTIME</text>
    <text x="795"  y="140" fill="#3ECF8E">04</text> <text x="815"  y="140" fill="#8a8a8a">TOOLS</text>
    <text x="1025" y="140" fill="#3ECF8E">05</text> <text x="1045" y="140" fill="#8a8a8a">STORES</text>
  </g>

  <!-- ============== COLUMN 1: CLIENT ============== -->
  <!-- Browser pill -->
  <g transform="translate(40, 165)">
    <rect width="240" height="46" rx="6" fill="#232323" stroke="#2D2D2D" stroke-width="1"/>
    <text x="14" y="20" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a" letter-spacing="0.15em">USER  ·  DESKTOP</text>
    <text x="14" y="36" font-size="13" font-weight="500" fill="#EDEDED">Browser</text>
    <text x="226" y="36" text-anchor="end" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">:5173</text>
  </g>
  <!-- Browser → React UI vertical link -->
  <line x1="160" y1="212" x2="160" y2="227" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- React UI -->
  <g transform="translate(40, 230)">
    <rect width="240" height="92" rx="6" fill="#232323" stroke="#2D2D2D" stroke-width="1"/>
    <text x="14" y="20" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.16em">SPA</text>
    <text x="14" y="40" font-size="14" font-weight="500" fill="#EDEDED">React UI · Vite</text>
    <text x="14" y="58" font-size="11" fill="#B8B8B8">Tailwind v4 · Fraunces / Bricolage</text>
    <text x="14" y="74" font-size="11" fill="#B8B8B8">Hero · Composer · Tool trace</text>
    <text x="14" y="88" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">+ msw / vitest</text>
  </g>
  <!-- React → useChat link -->
  <line x1="160" y1="323" x2="160" y2="338" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- useChat / postChat / state -->
  <g transform="translate(40, 340)">
    <rect width="240" height="92" rx="6" fill="#1F1F1F" stroke="#2D2D2D" stroke-width="1"/>
    <text x="14" y="20" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.16em">STATE</text>
    <text x="14" y="40" font-size="14" font-weight="500" fill="#EDEDED">useChat · postChat()</text>
    <text x="14" y="58" font-size="11" fill="#B8B8B8">turns[] · AbortController</text>
    <text x="14" y="74" font-size="11" fill="#B8B8B8">history accumulates locally</text>
    <text x="14" y="88" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">multi-turn · browser-side</text>
  </g>

  <!-- Horizontal: useChat → FastAPI -->
  <line x1="280" y1="386" x2="318" y2="386" stroke="#3ECF8E" stroke-width="1.5" marker-end="url(#arr-brand)"/>
  <text x="282" y="378" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.05em">POST /chat</text>
  <text x="282" y="402" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">{ message, history }</text>

  <!-- ============== COLUMN 2: API ============== -->
  <g transform="translate(320, 230)">
    <rect width="210" height="202" rx="6" fill="#232323" stroke="#2D2D2D" stroke-width="1"/>
    <text x="14" y="20" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.16em">HTTP  ·  PORT 8000</text>
    <text x="14" y="40" font-size="14" font-weight="500" fill="#EDEDED">FastAPI · uvicorn</text>
    <text x="14" y="58" font-size="11" fill="#B8B8B8">Pydantic schemas</text>
    <text x="14" y="74" font-size="11" fill="#B8B8B8">CORS · request-id middleware</text>
    <line x1="14" y1="90" x2="196" y2="90" stroke="#2D2D2D" stroke-width="0.5"/>
    <text x="14" y="108" font-size="11" font-weight="500" fill="#EDEDED">routes</text>
    <text x="14" y="124" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#B8B8B8">POST /chat</text>
    <text x="14" y="140" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#B8B8B8">GET  /health</text>
    <line x1="14" y1="156" x2="196" y2="156" stroke="#2D2D2D" stroke-width="0.5"/>
    <text x="14" y="174" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">config: settings.py + .env</text>
    <text x="14" y="190" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">connections: backend/db.py</text>
  </g>

  <!-- API → Agent -->
  <line x1="530" y1="332" x2="568" y2="332" stroke="#3ECF8E" stroke-width="1.5" marker-end="url(#arr-brand)"/>
  <text x="532" y="324" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E">run_agent()</text>

  <!-- ============== COLUMN 3: AGENT (centerpiece, brand-green panel) ============== -->
  <g transform="translate(570, 230)">
    <rect width="210" height="240" rx="8" fill="#3ECF8E"/>
    <rect x="2" y="2" width="206" height="236" rx="6" fill="none" stroke="#0A2014" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.45"/>
    <text x="14" y="22" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#0A2014" opacity="0.7" letter-spacing="0.16em">LANGCHAIN V1</text>
    <text x="14" y="50" font-size="18" font-weight="500" fill="#0A2014">ReAct Agent</text>
    <text x="14" y="68" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="13" fill="#0A2014">create_agent(model, tools, sp)</text>
    <line x1="14" y1="84" x2="196" y2="84" stroke="#0A2014" stroke-width="0.5" opacity="0.3"/>
    <text x="14" y="104" font-size="11" font-weight="500" fill="#0A2014">input messages</text>
    <text x="14" y="122" font-size="11" fill="#0A2014">· SystemPrompt (schema-grounded)</text>
    <text x="14" y="138" font-size="11" fill="#0A2014">· History (prior Q&amp;A pairs)</text>
    <text x="14" y="154" font-size="11" fill="#0A2014">· HumanMessage (this turn)</text>
    <line x1="14" y1="170" x2="196" y2="170" stroke="#0A2014" stroke-width="0.5" opacity="0.3"/>
    <text x="14" y="190" font-size="11" font-weight="500" fill="#0A2014">bound tools  ·  3</text>
    <text x="14" y="208" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0A2014">sql_query · mongo_query · rag</text>
    <line x1="14" y1="220" x2="196" y2="220" stroke="#0A2014" stroke-width="0.5" opacity="0.3"/>
    <text x="14" y="234" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#0A2014" opacity="0.75">max_iter 10 · recursion 21</text>
  </g>

  <!-- OpenAI Chat sidecar BELOW the agent -->
  <line x1="675" y1="470" x2="675" y2="497" stroke="#3ECF8E" stroke-width="1.2" stroke-dasharray="2 3" marker-end="url(#arr-brand)"/>
  <text x="683" y="486" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E">LLM</text>

  <g transform="translate(570, 500)">
    <rect width="210" height="56" rx="6" fill="#1F1F1F" stroke="#3ECF8E" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="20" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.16em">EXTERNAL  ·  LLM</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">OpenAI · chat completions</text>
    <text x="14" y="52" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a">gpt-4o-mini · temperature 0</text>
  </g>

  <!-- Branching arrows from agent → 3 tools (right-pointing) -->
  <line x1="780" y1="300" x2="818" y2="300" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="780" y1="360" x2="818" y2="360" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="780" y1="420" x2="818" y2="420" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ============== COLUMN 4: TOOLS ============== -->
  <!-- TOOL 1: sql_query -->
  <g transform="translate(820, 275)">
    <rect width="220" height="50" rx="6" fill="#232323" stroke="#2D2D2D" stroke-width="1"/>
    <rect width="3" height="50" fill="#3ECF8E"/>
    <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">TOOL  ·  1</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">sql_query</text>
    <text x="216" y="38" text-anchor="end" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a">LIMIT 200 · 5s</text>
  </g>
  <!-- TOOL 2: mongo_query -->
  <g transform="translate(820, 335)">
    <rect width="220" height="50" rx="6" fill="#232323" stroke="#2D2D2D" stroke-width="1"/>
    <rect width="3" height="50" fill="#3ECF8E"/>
    <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">TOOL  ·  2</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">mongo_query</text>
    <text x="216" y="38" text-anchor="end" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a">whitelist · no $where</text>
  </g>
  <!-- TOOL 3: handbook_search -->
  <g transform="translate(820, 395)">
    <rect width="220" height="50" rx="6" fill="#232323" stroke="#2D2D2D" stroke-width="1"/>
    <rect width="3" height="50" fill="#3ECF8E"/>
    <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">TOOL  ·  3</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">handbook_search</text>
    <text x="216" y="38" text-anchor="end" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a">top-k cosine</text>
  </g>

  <!-- Tools → Stores arrows -->
  <line x1="1042" y1="300" x2="1078" y2="300" stroke="#3ECF8E" stroke-width="1.2" marker-end="url(#arr-brand)"/>
  <line x1="1042" y1="360" x2="1078" y2="360" stroke="#3ECF8E" stroke-width="1.2" marker-end="url(#arr-brand)"/>
  <line x1="1042" y1="420" x2="1078" y2="420" stroke="#3ECF8E" stroke-width="1.2" marker-end="url(#arr-brand)"/>

  <!-- ============== COLUMN 5: STORES ============== -->
  <!-- STORE 1: Postgres -->
  <g transform="translate(1080, 275)">
    <rect width="260" height="50" rx="6" fill="#171717" stroke="#3ECF8E" stroke-width="1.2"/>
    <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">STORE  ·  1</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">Supabase Postgres</text>
    <text x="252" y="38" text-anchor="end" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" opacity="0.85">5 tbl · 103 rows</text>
  </g>
  <!-- STORE 2: MongoDB -->
  <g transform="translate(1080, 335)">
    <rect width="260" height="50" rx="6" fill="#171717" stroke="#3ECF8E" stroke-width="1.2"/>
    <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">STORE  ·  2</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">MongoDB Atlas</text>
    <text x="252" y="38" text-anchor="end" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" opacity="0.85">3 coll · 87 docs</text>
  </g>
  <!-- STORE 3: pgvector -->
  <g transform="translate(1080, 395)">
    <rect width="260" height="50" rx="6" fill="#171717" stroke="#3ECF8E" stroke-width="1.2"/>
    <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">STORE  ·  3</text>
    <text x="14" y="38" font-size="13" font-weight="500" fill="#EDEDED">pgvector · documents</text>
    <text x="252" y="38" text-anchor="end" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" opacity="0.85">31 chunks · 1536d</text>
  </g>

  <!-- handbook_search → OpenAI Embeddings (runtime embed-query, curved dashed) -->
  <path d="M 880 445 Q 880 530 720 660" fill="none" stroke="#3ECF8E" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#arr-brand)"/>
  <text x="800" y="520" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E">embed(query)</text>

  <!-- ============== INGEST PIPELINE BAND ============== -->
  <g transform="translate(40, 595)">
    <rect width="1300" height="110" rx="8" fill="#141414" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="18" y="22" font-size="10" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#3ECF8E" letter-spacing="0.18em">OFFLINE PIPELINE</text>
    <text x="160" y="22" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a" letter-spacing="0.16em">·  ONE-TIME SETUP  ·  data/ingest.py  ·  re-run to rebuild RAG corpus</text>

    <!-- step 1 -->
    <g transform="translate(20, 38)">
      <rect width="240" height="56" rx="5" fill="#1F1F1F" stroke="#2D2D2D" stroke-width="1"/>
      <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a" letter-spacing="0.14em">SOURCE</text>
      <text x="14" y="38" font-size="12" font-weight="500" fill="#EDEDED">skynova_handbook.md</text>
      <text x="14" y="52" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">~15 KB · policies + procedures</text>
    </g>
    <line x1="266" y1="66" x2="294" y2="66" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- step 2 -->
    <g transform="translate(300, 38)">
      <rect width="240" height="56" rx="5" fill="#1F1F1F" stroke="#2D2D2D" stroke-width="1"/>
      <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a" letter-spacing="0.14em">CHUNK</text>
      <text x="14" y="38" font-size="12" font-weight="500" fill="#EDEDED">MarkdownHeaderSplitter</text>
      <text x="14" y="52" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">## / ### → 31 section chunks</text>
    </g>
    <line x1="546" y1="66" x2="574" y2="66" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- step 3 (shared OpenAI Embeddings) -->
    <g transform="translate(580, 38)">
      <rect width="260" height="56" rx="5" fill="#1F1F1F" stroke="#3ECF8E" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">EMBED</text>
      <text x="14" y="38" font-size="12" font-weight="500" fill="#EDEDED">OpenAI Embeddings</text>
      <text x="14" y="52" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" opacity="0.85">text-embedding-3-small · 1536d</text>
    </g>
    <line x1="846" y1="66" x2="874" y2="66" stroke="#3ECF8E" stroke-width="1.2" marker-end="url(#arr-brand)"/>

    <!-- step 4 -->
    <g transform="translate(880, 38)">
      <rect width="260" height="56" rx="5" fill="#1F1F1F" stroke="#3ECF8E" stroke-width="1.2"/>
      <text x="14" y="20" font-size="9.5" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" letter-spacing="0.14em">PERSIST</text>
      <text x="14" y="38" font-size="12" font-weight="500" fill="#EDEDED">documents table · IVFFlat</text>
      <text x="14" y="52" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E" opacity="0.85">match_documents() RPC</text>
    </g>

    <!-- callback note: runtime also uses the same Embeddings service -->
    <text x="1160" y="58" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#6a6a6a">same service used</text>
    <text x="1160" y="72" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#3ECF8E">at runtime by tool 3 ↑</text>
  </g>

  <!-- ============== FOOTER ============== -->
  <line x1="40" y1="770" x2="1360" y2="770" stroke="#2D2D2D" stroke-width="0.5"/>
  <text x="40" y="790" font-size="10" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#8a8a8a" letter-spacing="0.18em">SKYNOVA  ·  INTERNAL-AGENT  ·  2026</text>
  <text x="700" y="790" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#5a5a5a">98 backend tests · 45 frontend tests · all green</text>
  <text x="1360" y="790" text-anchor="end" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#8a8a8a">multi-turn  ·  no auth  ·  no streaming  ·  single in-flight</text>
</svg>